allprojects {
    group = "io.github.jho951"
    version = "1.1.4"

    repositories {
        mavenCentral()
    }
}

subprojects {
    apply plugin: "java-library"
    apply plugin: "maven-publish"
    apply plugin: "signing"

    def safeProp = { name, defaultVal = "" ->
        return System.getenv(name) ?: (project.hasProperty(name) ? project.property(name) : defaultVal)
    }
    def normalizeSigningKey = { raw ->
        def text = (raw ?: "").toString().trim()
        if (!text) return ""
        text = text.replace("\\r\\n", "\n").replace("\\n", "\n")
        if (text.startsWith("-----BEGIN PGP PRIVATE KEY BLOCK-----")) {
            return text
        }
        try {
            return new String(text.decodeBase64(), "UTF-8").trim()
        } catch (Exception ignored) {
            return text
        }
    }

    def jVersion = safeProp('javaVersion', '17')
    def springVer = safeProp('springBootVersion', '3.3.5')
    def jjwtVer = safeProp('jjwtVersion', '0.11.5')
    def junitVer = safeProp('junit', '5.10.0')

    ext {
        springBootVersion = springVer
        jjwtVersion = jjwtVer
    }

    java {
        toolchain {
            languageVersion = JavaLanguageVersion.of(jVersion.toString().trim() as Integer)
        }
        withSourcesJar()
        withJavadocJar()
    }

    tasks.withType(JavaCompile).configureEach {
        options.release.set(jVersion.toString().trim() as Integer)
        options.encoding = "UTF-8"
    }

    tasks.withType(Javadoc).configureEach {
        // Existing source Javadocs are not doclint-clean yet; keep javadocJar generation non-blocking.
        options.addStringOption("Xdoclint:none", "-quiet")
    }

    dependencies {
        testImplementation platform("org.junit:junit-bom:${junitVer}")
        testImplementation 'org.junit.jupiter:junit-jupiter'
        testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
        testImplementation 'org.assertj:assertj-core:3.24.2'
    }

    test { useJUnitPlatform() }

    publishing {
        repositories {
            maven {
                def isSnapshot = project.version.toString().endsWith("SNAPSHOT")
                def releaseRepo = (System.getenv("MAVEN_CENTRAL_RELEASE_URL")
                        ?: project.findProperty("mavenCentralReleaseUrl")
                        ?: "https://ossrh-staging-api.central.sonatype.com/service/local/staging/deploy/maven2/") as String
                def snapshotRepo = (System.getenv("MAVEN_CENTRAL_SNAPSHOT_URL")
                        ?: project.findProperty("mavenCentralSnapshotUrl")
                        ?: "https://central.sonatype.com/repository/maven-snapshots/") as String

                name = "MavenCentral"
                url = uri(isSnapshot ? snapshotRepo : releaseRepo)
                credentials {
                    username = (System.getenv("MAVEN_CENTRAL_USERNAME")
                            ?: project.findProperty("mavenCentralUsername")
                            ?: System.getenv("OSSRH_USERNAME")
                            ?: project.findProperty("ossrhUsername")
                            ?: "") as String

                    password = (System.getenv("MAVEN_CENTRAL_PASSWORD")
                            ?: project.findProperty("mavenCentralPassword")
                            ?: System.getenv("OSSRH_PASSWORD")
                            ?: project.findProperty("ossrhPassword")
                            ?: "") as String
                }
            }
        }

        publications {
            mavenJava(MavenPublication) {
                // ✅ 실제 jar/component 포함
                from components.java

                groupId = project.group.toString()

                artifactId = "auth-${project.name}"

                version = project.version.toString()

                pom {
                    name = "auth-${project.name}"
                    description = "jho951 auth module: ${project.name}"
                    url = "https://github.com/jho951/auth"

                    licenses {
                        license {
                            name = "MIT License"
                            url = "https://opensource.org/licenses/MIT"
                        }
                    }

                    developers {
                        developer {
                            id = "jho951"
                            name = "jho951"
                        }
                    }

                    scm {
                        connection = "scm:git:https://github.com/jho951/auth.git"
                        developerConnection = "scm:git:ssh://git@github.com/jho951/auth.git"
                        url = "https://github.com/jho951/auth"
                    }
                }
            }
        }
    }

    signing {
        def key = normalizeSigningKey(System.getenv("MAVEN_CENTRAL_GPG_PRIVATE_KEY")
                ?: project.findProperty("mavenCentralSigningKey")
                ?: "")
        def pass = (System.getenv("MAVEN_CENTRAL_GPG_PASSPHRASE")
                ?: project.findProperty("mavenCentralSigningPassword")
                ?: "").toString()

        if (key) {
            useInMemoryPgpKeys(key, pass)
        }
        sign publishing.publications.mavenJava
    }

    tasks.withType(PublishToMavenRepository).configureEach {
        doFirst {
            def u = (System.getenv("MAVEN_CENTRAL_USERNAME")
                    ?: project.findProperty("mavenCentralUsername")
                    ?: System.getenv("OSSRH_USERNAME")
                    ?: project.findProperty("ossrhUsername")
                    ?: "").toString()

            def p = (System.getenv("MAVEN_CENTRAL_PASSWORD")
                    ?: project.findProperty("mavenCentralPassword")
                    ?: System.getenv("OSSRH_PASSWORD")
                    ?: project.findProperty("ossrhPassword")
                    ?: "").toString()

            def key = (System.getenv("MAVEN_CENTRAL_GPG_PRIVATE_KEY")
                    ?: project.findProperty("mavenCentralSigningKey")
                    ?: "")
            key = normalizeSigningKey(key)

            if (!u || !p) {
                throw new GradleException("Missing Maven Central credentials. Set MAVEN_CENTRAL_USERNAME/MAVEN_CENTRAL_PASSWORD (or OSSRH_USERNAME/OSSRH_PASSWORD).")
            }
            if (!key) {
                throw new GradleException("Missing signing key. Set MAVEN_CENTRAL_GPG_PRIVATE_KEY (or mavenCentralSigningKey).")
            }
        }
    }
}
