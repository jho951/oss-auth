name: publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      release-version: ${{ steps.release-version.outputs.value }}
    steps:
      - id: release-version
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"

          if [[ "$tag" != v* ]]; then
            echo "Expected a tag starting with 'v', got '$tag'." >&2
            exit 1
          fi

          version="${tag#v}"

          if [[ -z "$version" ]]; then
            echo "Resolved release version is empty." >&2
            exit 1
          fi

          echo "value=$version" >> "$GITHUB_OUTPUT"

  test:
    needs: prepare
    uses: ./.github/workflows/_gradle.yml
    with:
      gradle-task: test
      release-version: ${{ needs.prepare.outputs.release-version }}

  publish:
    needs:
      - prepare
      - test
    uses: ./.github/workflows/_gradle.yml
    with:
      gradle-task: publishAggregationToCentralPortal
      timeout-minutes: 30
      release-version: ${{ needs.prepare.outputs.release-version }}
    secrets:
      MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
      MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
      MAVEN_CENTRAL_GPG_PRIVATE_KEY: ${{ secrets.MAVEN_CENTRAL_GPG_PRIVATE_KEY }}
      MAVEN_CENTRAL_GPG_PASSPHRASE: ${{ secrets.MAVEN_CENTRAL_GPG_PASSPHRASE }}
