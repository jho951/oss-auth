name: gradle

on:
  workflow_call:
    inputs:
      gradle-task:
        description: Gradle task or task list to run.
        required: true
        type: string
      java-version:
        description: Java version for the workflow.
        required: false
        default: "17"
        type: string
      timeout-minutes:
        description: Job timeout in minutes.
        required: false
        default: 20
        type: number
      release-version:
        description: Optional release version to inject as a Gradle project property.
        required: false
        default: ""
        type: string
    secrets:
      MAVEN_CENTRAL_USERNAME:
        required: false
      MAVEN_CENTRAL_PASSWORD:
        required: false
      MAVEN_CENTRAL_GPG_PRIVATE_KEY:
        required: false
      MAVEN_CENTRAL_GPG_PASSPHRASE:
        required: false

permissions:
  contents: read

jobs:
  gradle:
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout-minutes }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ inputs.java-version }}

      - uses: gradle/actions/setup-gradle@v4

      - name: Run Gradle task
        shell: bash
        env:
          RELEASE_VERSION: ${{ inputs.release-version }}
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          MAVEN_CENTRAL_GPG_PRIVATE_KEY: ${{ secrets.MAVEN_CENTRAL_GPG_PRIVATE_KEY }}
          MAVEN_CENTRAL_GPG_PASSPHRASE: ${{ secrets.MAVEN_CENTRAL_GPG_PASSPHRASE }}
        run: |
          if [[ -n "$RELEASE_VERSION" ]]; then
            export ORG_GRADLE_PROJECT_release_version="$RELEASE_VERSION"
          fi

          ./gradlew ${{ inputs.gradle-task }} --no-daemon --stacktrace
