name: 기능 제안
description: 공개 API, 예시, 문서 개선 아이디어를 사용 사례와 함께 제안합니다
title: "[기능] "
labels: ["FEATURE"]

body:
  - type: markdown
    attributes:
      value: |
        먼저 해결하려는 문제를 설명해주세요.
        이 저장소는 공개 계약, 예시, 문서에 집중합니다.
        프레임워크 전용 어댑터나 저장소 구현은 범위 밖일 수 있습니다.

  - type: checkboxes
    id: checks
    attributes:
      label: 사전 확인
      options:
        - label: 기존 이슈, 문서, 예시를 먼저 확인했습니다.
          required: true
        - label: 제안 범위가 이 저장소의 공개 API, 예시, 문서와 관련 있습니다.
          required: true

  - type: textarea
    id: overview
    attributes:
      label: 요약
      description: 무엇을 추가하거나 개선하고 싶나요?
      placeholder: |
        예: 구조화된 거부 사유를 담는 공개 타입을 추가하고 싶습니다.
    validations:
      required: true

  - type: textarea
    id: background
    attributes:
      label: 문제 또는 사용 사례
      description: 어떤 불편이나 제약을 해결하고 싶나요?
      placeholder: |
        예:
        - 연동 구현에서 거부 사유를 구조적으로 표현할 수 없습니다.
        - 하위 프로젝트마다 같은 계약을 다시 만들고 있습니다.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 제안하는 방향
      description: 원하는 API, 문서, 예시 방향이 있으면 적어주세요.
      placeholder: |
        예:
        - 새로운 공개 타입 추가
        - 예시 코드 보강
        - README 사용 예시 확장
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: 현재 우회 방법 또는 대안
      description: 지금 어떻게 해결하고 있는지, 왜 부족한지 적어주세요.
      placeholder: |
        예:
        - 하위 프로젝트마다 별도 래퍼 타입을 만들고 있습니다.
        - 문서만으로는 표현 의도가 충분히 전달되지 않습니다.
    validations:
      required: false

  - type: textarea
    id: compatibility
    attributes:
      label: 호환성 또는 범위 메모
      description: 하위 호환성, 마이그레이션, 범위 제한에 대한 의견이 있으면 적어주세요.
      placeholder: |
        예:
        - 기존 공개 API는 유지되어야 합니다.
        - 문서와 예시 변경만으로 충분할 수도 있습니다.
    validations:
      required: false

  - type: input
    id: references
    attributes:
      label: 참고 자료
      description: 관련 이슈, PR, 외부 참고 자료
      placeholder: "#123"
    validations:
      required: false
